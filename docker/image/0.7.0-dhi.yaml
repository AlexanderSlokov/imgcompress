# Every DHI definition starts with a syntax directive that tells BuildKit which DHI build frontend to use.
# syntax=dhi.io/build:2-debian13

name: Imgcompress 0.7.0 DHI Debian 13
image: thanhzeus2016/imgcompress:0.7.0-dhi-debian13
variant: runtime
tags:
  - "0.7.0-dhi-debian13"
platforms:
  - linux/amd64
  - linux/arm64

contents:
  repositories:
    - https://github.com/AlexanderSlokov/imgcompress/tree/test-build-dhi
  # keyring:
  #   - https://nginx.org/keys/nginx_signing.rsa.pub
  packages:
    - base-files
    - ghostscript
    - libjpeg62-turbo
    - libpng16-16
    - libtiff6
    - libwebp7
    - libopenjp2-7
    - libimagequant0
    - libheif1
    - liblcms2-2
    - libfreetype6
    - libharfbuzz0b
    - libfribidi0
    - libxcb1
    - zlib1g
    - libgif7
    - dumb-init
    - libstdc++6
    - libgomp1
  builds:
    - name: frontend-builder
      contents:
        packages:
          - nodejs-24
          - pnpm
          - git
      pipeline:
            - name: compile-react
              runs: |
                git clone https://github.com/AlexanderSlokov/imgcompress/tree/test-build-dhi /app
                cd /app/frontend
                pnpm install
                pnpm run build
      outputs:
        - source: /app/frontend/out
          target: /container/static_site
          uid: 65532
          gid: 65532
          diff: true

accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot

os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/

environment:
  VIRTUAL_ENV: "/container/venv"
  PATH: "$VIRTUAL_ENV/bin:$PATH"
  U2NET_HOME: "/container/.u2net"

annotations:
  org.opencontainers.image.authors: "Karim Zouine <mails.karimzouine@gmail.com>"
  org.opencontainers.image.vendor: "Karim Zouine"
  org.opencontainers.image.title: "imgcompress - High Performance Image Compression & Background Removal"
  org.opencontainers.image.description: "Self-hosted, privacy-first tool for image compression, conversion (HEIC/WebP/PDF), and background removal using local AI. Supports 70+ formats."
  org.opencontainers.image.url: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.source: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.documentation: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.licenses: "GPL-3.0-or-later"

work-dir: /container

entrypoint:
  - /usr/bin/dumb-init
  - --

cmd:
  - python
  - /container/entrypoint.py

ports:
  - 5000/tcp
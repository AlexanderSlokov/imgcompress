# Every DHI definition starts with a syntax directive that tells BuildKit which DHI build frontend to use.
# syntax=dhi.io/build:2-debian13

name: Imgcompress 0.7.0 DHI Debian 13
image: thanhzeus2016/imgcompress:0.7.0-dhi-debian13
variant: runtime
tags:
  - "0.7.0-dhi-debian13"
platforms:
  - linux/amd64
  - linux/arm64

contents:
  repositories:
    - https://github.com/AlexanderSlokov/imgcompress/tree/test-build-dhi
  # keyring:
  #   - https://nginx.org/keys/nginx_signing.rsa.pub
  packages:
    - alpine-baselayout-data
    - busybox
    - musl-utils
    - nginx=1.29.5-r1
  builds:
    - name: nginx
      contents:
        repositories:
          - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
          - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
          - http://nginx.org/packages/mainline/alpine/v3.23/main
        keyring:
          - https://nginx.org/keys/nginx_signing.rsa.pub
        packages:
          - alpine-baselayout-data
          - bash
          - musl-utils
          - nginx=1.29.5-r1
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            ln -sf /dev/stdout /var/log/nginx/access.log
            ln -sf /dev/stderr /var/log/nginx/error.log

            sed -i "s,listen       80;,listen       8080;," /etc/nginx/conf.d/default.conf
            sed -i "/user  nginx;/d" /etc/nginx/nginx.conf
            sed -i "s,pid        /run/nginx.pid;,pid        /var/run/nginx.pid;," /etc/nginx/nginx.conf
            sed -i '/^http {$/a\    server_tokens off;' /etc/nginx/nginx.conf

            chown -R 65532:65532 /var/cache/nginx
            chmod -R g+w /var/cache/nginx
            chown -R 65532:65532 /etc/nginx
            chmod -R g+w /etc/nginx
            chown -R 65532:65532 /run
            chown -R 65532:65532 /run/lock
            chown -R 65532:65532 /var/run
            chown -R 65532:65532 /var/log/nginx
      outputs:
        - source: /
          target: /
          uid: 0
          gid: 0
          diff: true

accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot

os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/

environment:
  VIRTUAL_ENV: "/container/venv"
  PATH: "$VIRTUAL_ENV/bin:$PATH"
  U2NET_HOME: "/container/.u2net"

annotations:
  org.opencontainers.image.authors: "Karim Zouine <mails.karimzouine@gmail.com>"
  org.opencontainers.image.vendor: "Karim Zouine"
  org.opencontainers.image.title: "imgcompress - High Performance Image Compression & Background Removal"
  org.opencontainers.image.description: "Self-hosted, privacy-first tool for image compression, conversion (HEIC/WebP/PDF), and background removal using local AI. Supports 70+ formats."
  org.opencontainers.image.url: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.source: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.documentation: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.licenses: "GPL-3.0-or-later"

work-dir: /container

entrypoint:
  - /usr/bin/dumb-init
  - --

cmd:
  - python
  - /container/entrypoint.py

ports:
  - 5000/tcp
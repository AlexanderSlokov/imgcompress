# syntax=dhi.io/build:2-debian13

name: Imgcompress 0.6.1 DHI Debian 13
image: thanhzeus2016/imgcompress
variant: runtime
tags:
  - "0.6.1-dhi-debian13"
platforms:
  - linux/amd64
  - linux/arm64

os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/

annotations:
  org.opencontainers.image.authors: "Karim Zouine <mails.karimzouine@gmail.com>"
  org.opencontainers.image.vendor: "Karim Zouine"
  org.opencontainers.image.title: "imgcompress - High Performance Image Compression & Background Removal"
  org.opencontainers.image.description: "Self-hosted, privacy-first tool for image compression, conversion (HEIC/WebP/PDF), and background removal using local AI. Supports 70+ formats."
  org.opencontainers.image.url: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.source: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.documentation: "https://github.com/karimz1/imgcompress"
  org.opencontainers.image.licenses: "GPL-3.0-or-later"

environment:
  VIRTUAL_ENV: "/container/venv"
  PATH: "/container/venv/bin:/container/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  U2NET_HOME: "/container/.u2net"

work-dir: /container

# ─────────────────────────────────────────────────────────────────────────────
# Image contents
# ─────────────────────────────────────────────────────────────────────────────
# DHI solver installs system packages directly (replaces extract_deps.sh + ldd
# + dpkg-L + ldconfig). Application files come from the artifact-carrier stage
# built by the regular Dockerfile.
contents:
  packages:
    - '!mawk'
    - '!original-awk'
    - base-files
    # Container init (PID 1 signal forwarding + zombie reaping)
    - dumb-init
    # ── Pillow / imaging native deps ──
    - ghostscript
    - libjpeg62-turbo
    - libpng16-16
    - libtiff6
    - libwebp7
    - libopenjp2-7
    - libimagequant0
    - libheif1
    - liblcms2-2
    - libfreetype6
    - libharfbuzz0b
    - libfribidi0
    - libxcb1
    - zlib1g
    - libgif7
    # ── C++ runtime (onnxruntime, granian) ──
    - libstdc++6
    - libgomp1
  artifacts:
    # Application bundle built by: make artifact_push
    # Contains: Python runtime, venv, backend code, frontend static files, u2net model.
    # Rebuild + push the carrier, then update the digest below.
    - name: docker.io/karimz1/imgcompress-app:0.6.1@sha256:REPLACE_WITH_ACTUAL_DIGEST
      includes:
        - container/**
      uid: 65532
      gid: 65532

paths:
  - type: directory
    path: /container
    uid: 65532
    gid: 65532
    mode: "0755"

accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot

ports:
  - 5000/tcp

entrypoint:
  - /usr/bin/dumb-init
  - --
  - python
  - /container/entrypoint.py
